fullName: reference-server
namespace: default

secretStoreRefName: fake-secret-store

container:
  image: anchor-platform:local
  imagePullPolicy: Never

config:
  app:
    horizonEndpoint: https://horizon-testnet.stellar.org
    rpcEndpoint: https://soroban-testnet.stellar.org
    platformApiEndpoint: http://anchor-platform-svc-platform:8085
    rpcEnabled: false
  auth:
    type: NONE
  data:
    url: postgresql-ref:5432

services:
  ref:
    containerPort: 8091
    servicePort: 8091
    type: ClusterIP
    name: reference-server
    deployment:
      replicas: 1
      resources:
        requests:
          memory: 512Mi
          cpu: 500m
        limits:
          memory: 1Gi
          cpu: 1
ingress:
  enabled: true
  name: ingress-reference-server
  rules:
    host: reference-server.local
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

httpRoute:
  enabled: false
  parentRefs:
    - name: reference-server-gateway
      namespace: ""      # defaults to release namespace
      sectionName: ""
  hostnames: []
  annotations: {}
  labels: {}
  responseHeaders: {}
  gateway:
    enabled: false
    gatewayClassName: ""
    name: ""
    listeners:
      - name: http
        protocol: HTTP
        port: 80
      # - name: https
      #   protocol: HTTPS
      #   port: 443
      #   hostname: reference-server.example.com
      #   tls:
      #     mode: Terminate
      #     certificateRefs:
      #       - name: reference-server-tls-cert
      #   allowedRoutes:
      #     namespaces:
      #       from: Same
    annotations: {}
    labels: {}
